<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Terminal and deployment background">
  <defs>
    <linearGradient id="bg" x1="1" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#07100d"/>
      <stop offset="0.45" stop-color="#111719"/>
      <stop offset="1" stop-color="#17110e"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#dceee6" stroke-opacity="0.055"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g opacity="0.2">
    <rect x="210" y="150" width="520" height="300" rx="18" fill="#0d1c18" stroke="#47d18c"/>
    <rect x="870" y="250" width="480" height="350" rx="18" fill="#0e171d" stroke="#7fc7ff"/>
  </g>
  <g font-family="SFMono-Regular, Consolas, monospace" fill="#f7fff9">
    <text x="260" y="230" font-size="34" opacity="0.24">$ mvn clean deploy</text>
    <text x="260" y="295" font-size="28" opacity="0.17">[INFO] tests: JUnit, Mockito</text>
    <text x="260" y="350" font-size="28" opacity="0.17">[INFO] image pushed to EKS</text>
    <text x="930" y="335" font-size="32" opacity="0.22">/actuator/health</text>
    <text x="930" y="395" font-size="28" opacity="0.16">{ "status": "UP" }</text>
    <text x="930" y="455" font-size="28" opacity="0.16">p95 latency: 118ms</text>
  </g>
  <path d="M300 680c150-120 300-20 460-100s260-150 520-50" fill="none" stroke="#f28c38" stroke-width="5" stroke-opacity="0.2"/>
</svg>
