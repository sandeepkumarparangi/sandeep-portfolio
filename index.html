<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="High-end portfolio for Sandeep Kumar Parangi, Senior Java Full Stack Developer specializing in Java, Spring Boot, AWS, Kafka, microservices, distributed systems, and AI integration."
    />
    <meta name="theme-color" content="#050816" />
    <title>Sandeep Kumar Parangi | Senior Java Full Stack Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&family=Space+Grotesk:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind = {
        config: {
          darkMode: "class",
          theme: {
            extend: {
              fontFamily: {
                body: ["Inter", "system-ui", "sans-serif"],
                heading: ["Space Grotesk", "Poppins", "Inter", "sans-serif"],
                display: ["Poppins", "Space Grotesk", "Inter", "sans-serif"]
              },
              colors: {
                night: "#050816",
                ink: "#f8fbff",
                muted: "#9aa8c7",
                cyan: "#38bdf8",
                violet: "#8b5cf6",
                electric: "#6ee7f9"
              },
              boxShadow: {
                glow: "0 0 50px rgba(56, 189, 248, 0.24)",
                violet: "0 0 70px rgba(139, 92, 246, 0.22)"
              }
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.0",
          "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",

          "framer-motion": "https://esm.sh/framer-motion@11.18.2?external=react,react-dom",
          "lucide-react": "https://esm.sh/lucide-react@0.468.0?external=react"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
    <script>
      Babel.registerPreset("react-classic", function () {
        return {
          presets: [[Babel.availablePresets.react, { runtime: "classic" }]]
        };
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react-classic" src="src/main.jsx"></script>
  </body>
</html>
